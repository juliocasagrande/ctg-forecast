<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background rounded square -->
  <rect width="200" height="200" rx="40" fill="#001F5B"/>
  
  <!-- Subtle inner gradient overlay -->
  <rect width="200" height="200" rx="40" fill="url(#grad)" opacity="0.15"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00AEEF"/>
      <stop offset="100%" stop-color="#001F5B"/>
    </linearGradient>
  </defs>

  <!-- Grid lines (blueprint feel) -->
  <line x1="40" y1="70" x2="160" y2="70" stroke="#00AEEF" stroke-width="0.5" opacity="0.18"/>
  <line x1="40" y1="95" x2="160" y2="95" stroke="#00AEEF" stroke-width="0.5" opacity="0.18"/>
  <line x1="40" y1="120" x2="160" y2="120" stroke="#00AEEF" stroke-width="0.5" opacity="0.18"/>
  <line x1="70" y1="45" x2="70" y2="155" stroke="#00AEEF" stroke-width="0.5" opacity="0.18"/>
  <line x1="100" y1="45" x2="100" y2="155" stroke="#00AEEF" stroke-width="0.5" opacity="0.18"/>
  <line x1="130" y1="45" x2="130" y2="155" stroke="#00AEEF" stroke-width="0.5" opacity="0.18"/>

  <!-- Hexagon (engineering symbol) -->
  <polygon points="100,42 128,58 128,90 100,106 72,90 72,58"
    fill="none" stroke="#00AEEF" stroke-width="2.5" opacity="0.9"/>

  <!-- Inner hexagon fill -->
  <polygon points="100,52 120,63 120,85 100,96 80,85 80,63"
    fill="#00AEEF" opacity="0.12"/>

  <!-- Gear-like cross inside hex -->
  <line x1="100" y1="55" x2="100" y2="93" stroke="#00AEEF" stroke-width="2" opacity="0.7"/>
  <line x1="82" y1="65" x2="118" y2="83" stroke="#00AEEF" stroke-width="2" opacity="0.7"/>
  <line x1="82" y1="83" x2="118" y2="65" stroke="#00AEEF" stroke-width="2" opacity="0.7"/>

  <!-- Center dot -->
  <circle cx="100" cy="74" r="5" fill="#00AEEF"/>

  <!-- S-curve / trend line below -->
  <path d="M 48,148 Q 74,132 100,138 Q 126,144 152,118"
    fill="none" stroke="#00AEEF" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  
  <!-- Dots on curve -->
  <circle cx="48" cy="148" r="3" fill="#00AEEF" opacity="0.9"/>
  <circle cx="100" cy="138" r="3" fill="#00AEEF" opacity="0.9"/>
  <circle cx="152" cy="118" r="3.5" fill="#00AEEF"/>

  <!-- CTG wordmark top -->
  <text x="100" y="32" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="700"
    fill="#FFFFFF" text-anchor="middle" letter-spacing="5">CTG</text>

  <!-- ENGENHARIA label bottom -->
  <text x="100" y="178" font-family="'Arial', sans-serif" font-size="10.5" font-weight="600"
    fill="#00AEEF" text-anchor="middle" letter-spacing="2.5">ENGENHARIA</text>
  
  <!-- thin separator line -->
  <line x1="36" y1="165" x2="164" y2="165" stroke="#00AEEF" stroke-width="0.8" opacity="0.4"/>
</svg>
