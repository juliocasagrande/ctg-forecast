<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#001F5B" />
    <title>Engenharia Eletromecânica | CTG Brasil</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="engenharia-eletromecanica/assets/workbench.css" />
  </head>
  <body>
    <main class="workbench" aria-label="Landing page de Engenharia Eletromecânica">
      <div class="sunlight" aria-hidden="true"></div>
      <div class="tabletop">
        <div class="tool ruler ruler-top" aria-hidden="true"><span></span></div>
        <div class="tool ruler ruler-bottom" aria-hidden="true"><span></span></div>
                <div class="tool pen" aria-hidden="true"></div>
        <div class="tool compass" aria-hidden="true"><span></span></div>
        <div class="tool set-square" aria-hidden="true"></div>
        <div class="tool rolled-plans" aria-hidden="true"><span></span><span></span></div>
        <section class="desk-layout" aria-label="Prancheta com folhas de anotação">
          <nav class="notes notes-left" aria-label="Folhas de anotação do lado esquerdo">
            <button class="note is-active" type="button" data-page="cover" aria-pressed="true"><span class="note-number">00</span><strong>Início</strong><small>Entrada da pasta</small><i aria-hidden="true"></i></button>
            <button class="note" type="button" data-page="gestao" aria-pressed="false"><span class="note-number">01</span><strong>Gestão</strong><small>Metas, férias e rotina do time.</small><i aria-hidden="true"></i></button>
            <button class="note" type="button" data-page="engenharia" aria-pressed="false"><span class="note-number">03</span><strong>Engenharia</strong><small>Elétrica, mecânica, confiabilidade e desempenho.</small><i aria-hidden="true"></i></button>
            <button class="note" type="button" data-page="referencias" aria-pressed="false"><span class="note-number">05</span><strong>Referências</strong><small>Acervo, atas e treinamentos.</small><i aria-hidden="true"></i></button>
          </nav>
          <article class="clipboard" aria-live="polite">
            <div class="clip" aria-hidden="true"></div>
            <div class="paper" id="page-paper">
              <header class="paper-topline">
                <div class="brand-lockup"><img src="logo.svg" alt="CTG Brasil" /><span><strong>CTG Brasil</strong><small>Engenharia Eletromecânica</small></span></div>
              </header>
              <div class="paper-content" id="paper-content"></div>
            </div>
          </article>
          <nav class="notes notes-right" aria-label="Folhas de anotação do lado direito">
            <button class="note" type="button" data-page="tecnico" aria-pressed="false"><span class="note-number">02</span><strong>Técnico</strong><small>Especificações, controle de documentos, dados e relatórios.</small><i aria-hidden="true"></i></button>
            <button class="note" type="button" data-page="projetos" aria-pressed="false"><span class="note-number">04</span><strong>Projetos</strong><small>Projetos, Planejamentos, PMS e suprimentos.</small><i aria-hidden="true"></i></button>
            <button class="note" type="button" data-page="sistemas" aria-pressed="false"><span class="note-number">06</span><strong>Sistemas</strong><small>Acesso ao CTG.Engenharia.</small><i aria-hidden="true"></i></button>
            <button class="note" type="button" data-page="organograma" aria-pressed="false"><span class="note-number">07</span><strong>Organograma da área</strong><small>Estrutura e contatos da equipe.</small><i aria-hidden="true"></i></button>
          </nav>
        </section>
      </div>
    </main>
    <script src="engenharia-eletromecanica/assets/workbench.js"></script>
  </body>
</html>
