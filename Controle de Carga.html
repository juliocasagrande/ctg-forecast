<script type="text/babel">
const { useState, useMemo } = React;
const { TweaksPanel, TweakSection, TweakRadio, TweakToggle, useTweaks } = window;

// ── Timeline ─────────────────────────────────────────────────
const TS  = new Date('2026-05-01');
const TE  = new Date('2026-10-31');
const TOD = new Date('2026-06-24');
const TR  = +TE - +TS;

function pct(d)  { const t = typeof d==='string'?new Date(d):d; return Math.max(0,Math.min(100,(+t-+TS)/TR*100)); }
function bw(s,e) { return Math.max(.4,(Math.min(+TE,+new Date(e))-Math.max(+TS,+new Date(s)))/TR*100); }
function fmts(d) { return new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}); }
function fmtl(d) { return new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}); }

const MONTHS = (()=>{
  const out=[];
  const c = new Date(TS.getFullYear(), TS.getMonth(), 1);
  while(c <= TE){
    const ms = new Date(c), me = new Date(c.getFullYear(), c.getMonth()+1, 0);
    const vs = new Date(Math.max(+TS,+ms)), ve = new Date(Math.min(+TE,+me));
    out.push({ lbl: ms.toLocaleDateString('pt-BR',{month:'short'}).replace('.','').toUpperCase(),
               yr: ms.getFullYear(), left: pct(vs), width: (+ve-+vs)/TR*100 });
    c.setMonth(c.getMonth()+1);
  }
  return out;
})();

// ── Tokens ───────────────────────────────────────────────────
const SC = {
  andamento:{ l:'Em andamento', c:'#2b7fd4', t:'#e7f0fb', d:'#1c5cab' },
  planejada:{ l:'Planejada',    c:'#7aa7e0', t:'#eef3fc', d:'#4d7ec0' },
  atrasada: { l:'Atrasada',     c:'#e0524b', t:'#fdeceb', d:'#c33b35' },
  concluida:{ l:'Concluída',    c:'#2f9e54', t:'#e6f5ec', d:'#1f7a3f' },
};
const RC = {
  gerente:{ l:'Gerente',        c:'#16335c', t:'#e4eaf6', bg:'#edf2f9' },
  coord:  { l:'Coordenador(a)', c:'#15716c', t:'#dcf0ea', bg:'#ebf7f3' },
  eng:    { l:'Engenheiro(a)',  c:'#2b5fa0', t:'#dce8f8', bg:'#edf3fc' },
};
function lc(v){ return v>=100?'#e0524b':v>=85?'#e6a532':'#2f9e54'; }

// ── Data ─────────────────────────────────────────────────────
const PEOPLE = [
  {id:1, name:'Carlos Andrade',  role:'gerente', ini:'CA'},
  {id:2, name:'Fernanda Lima',   role:'coord',   ini:'FL'},
  {id:3, name:'Roberto Neves',   role:'coord',   ini:'RN'},
  {id:4, name:'Ana Martins',     role:'eng',     ini:'AM'},
  {id:5, name:'Pedro Costa',     role:'eng',     ini:'PC'},
  {id:6, name:'Juliana Santos',  role:'eng',     ini:'JS'},
  {id:7, name:'Miguel Ferreira', role:'eng',     ini:'MF'},

const INIT_DEMANDS = [

  {id:'d6', p:3, name:'Montagem Mecânica',           proj:'UHE Garibaldi', s:'2026-06-10', e:'2026-10-15', load:70, st:'andamento'},
  {id:'d7', p:3, name:'Inspeção de Equipamentos',    proj:'PCH Areia',     s:'2026-05-01', e:'2026-06-30', load:20, st:'atrasada' },
  {id:'d8', p:4, name:'Dim. Hidráulico',             proj:'PCH Areia',     s:'2026-05-20', e:'2026-07-10', load:50, st:'andamento'},
  {id:'d9', p:4, name:'Relatório Final',             proj:'Porto Sul',     s:'2026-07-15', e:'2026-09-30', load:40, st:'planejada' },
  {id:'d10',p:5, name:'Memorial Descritivo',         proj:'UHE Garibaldi', s:'2026-06-01', e:'2026-08-15', load:45, st:'andamento'},
  {id:'d11',p:5, name:'Cálculo Estrutural',          proj:'Porto Sul',     s:'2026-08-01', e:'2026-10-20', load:55, st:'planejada' },
  {id:'d12',p:6, name:'Projeto de Automação',        proj:'PCH Areia',     s:'2026-05-01', e:'2026-06-30', load:80, st:'atrasada' },
  {id:'d13',p:6, name:'Testes FAT',                  proj:'UHE Garibaldi', s:'2026-07-01', e:'2026-09-30', load:60, st:'planejada' },
  {id:'d14',p:7, name:'Instalação Elétrica',         proj:'Porto Sul',     s:'2026-06-15', e:'2026-09-30', load:65, st:'andamento'},
  {id:'d15',p:7, name:'Documentação As-Built',       proj:'PCH Areia',     s:'2026-09-01', e:'2026-10-31', load:30, st:'planejada' },

function curLoad(pid, demands){
  return demands.filter(d => d.p===pid && new Date(d.s)<=TOD && new Date(d.e)>=TOD)
                .reduce((s,d) => s+d.load, 0);
}

// ── Tooltip ──────────────────────────────────────────────────
function Tooltip({demand, x, y}){
  if(!demand) return null;
  const s = SC[demand.st];
  return (
    <div style={{position:'fixed', left:Math.min(x+14, window.innerWidth-235),
      top:Math.max(4, y-75), background:'#fff', border:'1px solid #dde3ec',
      borderRadius:10, padding:'10px 14px', boxShadow:'0 8px 24px rgba(0,0,0,.15)',
      zIndex:2000, pointerEvents:'none', minWidth:200}}>
      <div style={{fontSize:13, fontWeight:700, color:'#16335c', marginBottom:6, lineHeight:1.3}}>{demand.name}</div>
      <div style={{display:'flex', flexDirection:'column', gap:3.5, fontSize:11.5, color:'#6b7a90'}}>
        <span>📁 {demand.proj}</span>
        <span>📅 {fmts(demand.s)} — {fmts(demand.e)}</span>
      </div>
      <div style={{marginTop:8, paddingTop:8, borderTop:'1px solid #eef1f6',
        display:'flex', alignItems:'center', gap:8}}>
        <span style={{display:'flex', alignItems:'center', gap:5, fontSize:11.5, fontWeight:600, color:s.d}}>
          <span style={{width:8, height:8, borderRadius:2, background:s.c, display:'inline-block'}}></span>
          {s.l}
        </span>
        <span style={{marginLeft:'auto', fontSize:14, fontWeight:800, color:'#16335c'}}>{demand.load}%</span>
      </div>

}

// ── Demand Drawer ─────────────────────────────────────────────
function DemandDrawer({demand, onClose, setDemands}){
  if(!demand) return null;
  const s   = SC[demand.st];
  const per = PEOPLE.find(p => p.id === demand.p);
  const rc  = RC[per.role];
  const [curSt, setCurSt] = useState(demand.st);

  function pick(k){
    setCurSt(k);
    setDemands(prev => prev.map(d => d.id===demand.id ? {...d, st:k} : d));
  }

  return (
    <>
      <div style={{position:'fixed',inset:0,zIndex:399,background:'rgba(16,28,60,.22)'}} onClick={onClose}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:380,background:'#fff',
        boxShadow:'-4px 0 28px rgba(0,0,0,.14)',zIndex:400,display:'flex',flexDirection:'column'}}>

        <div style={{background:'linear-gradient(100deg,#0c3470,#1c5cab)',padding:'20px 20px 18px',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:10.5,color:'rgba(255,255,255,.5)',textTransform:'uppercase',letterSpacing:'.9px',marginBottom:5}}>Demanda</div>
              <div style={{fontSize:17,fontWeight:700,color:'#fff',lineHeight:1.3}}>{demand.name}</div>
              <div style={{fontSize:12.5,color:'rgba(255,255,255,.7)',marginTop:5}}>📁 {demand.proj}</div>
            </div>
            <button onClick={onClose} style={{background:'rgba(255,255,255,.15)',border:'none',borderRadius:8,
              width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',
              cursor:'pointer',color:'#fff',fontSize:20,flexShrink:0}}>×</button>
          </div>
          <div style={{marginTop:12,display:'flex',gap:8,flexWrap:'wrap'}}>
            <span style={{background:SC[curSt].c,color:'#fff',borderRadius:6,padding:'4px 10px',fontSize:11.5,fontWeight:600}}>{SC[curSt].l}</span>
            <span style={{background:'rgba(255,255,255,.18)',color:'#fff',borderRadius:6,padding:'4px 10px',fontSize:11.5,fontWeight:600}}>{demand.load}% carga</span>
          </div>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'20px'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',background:'#f7f9fc',borderRadius:10,marginBottom:18}}>
            <div style={{width:36,height:36,borderRadius:'50%',background:rc.t,border:`2px solid ${rc.c}`,
              display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <span style={{fontSize:12,fontWeight:700,color:rc.c}}>{per.ini}</span>
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:'#16335c'}}>{per.name}</div>
              <div style={{fontSize:11.5,color:'#6b7a90'}}>{rc.l}</div>
            </div>
          </div>

          <div style={{marginBottom:18}}>
            <div style={{fontSize:9.5,fontWeight:700,letterSpacing:'.8px',textTransform:'uppercase',color:'#6b7a90',marginBottom:8}}>Período</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[['Início',demand.s],['Fim',demand.e]].map(([lbl,val])=>(
                <div key={lbl} style={{background:'#f7f9fc',borderRadius:8,padding:'10px 12px'}}>
                  <div style={{fontSize:10,color:'#8a93a3',marginBottom:3}}>{lbl}</div>
                  <div style={{fontSize:13.5,fontWeight:600,color:'#16335c'}}>{fmtl(val)}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{marginBottom:20}}>
            <div style={{fontSize:9.5,fontWeight:700,letterSpacing:'.8px',textTransform:'uppercase',color:'#6b7a90',marginBottom:8}}>Carga alocada</div>
            <div style={{background:'#f7f9fc',borderRadius:8,padding:'12px 14px',display:'flex',alignItems:'center',gap:12}}>
              <div style={{flex:1,background:'#e4e8f0',borderRadius:4,height:8,overflow:'hidden'}}>
                <div style={{width:`${demand.load}%`,background:lc(demand.load),height:'100%',borderRadius:4}}></div>
              </div>
              <span style={{fontSize:18,fontWeight:800,color:lc(demand.load),minWidth:42,textAlign:'right'}}>{demand.load}%</span>
            </div>
          </div>

          <div>
            <div style={{fontSize:9.5,fontWeight:700,letterSpacing:'.8px',textTransform:'uppercase',color:'#6b7a90',marginBottom:10}}>Alterar status</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {Object.entries(SC).map(([k,v])=>(
                <button key={k} onClick={()=>pick(k)} style={{
                  border:`2px solid ${curSt===k?v.c:'#e4e8f0'}`,borderRadius:9,
                  padding:'9px 14px',fontSize:13,fontWeight:600,cursor:'pointer',
                  background:curSt===k?v.t:'#fafbfd',color:curSt===k?v.d:'#6b7a90',
                  display:'flex',alignItems:'center',gap:8,textAlign:'left',
                  fontFamily:'inherit',transition:'all .15s',
                }}>
                  <span style={{width:10,height:10,borderRadius:3,background:v.c,flexShrink:0}}></span>
                  {v.l}
                  {curSt===k && <span style={{marginLeft:'auto',fontSize:11,color:v.d}}>✓ Atual</span>}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

// ── Add Demand Modal ──────────────────────────────────────────

  const [f, setF] = useState({p:defaultPerson||1, name:'', proj:'UHE Garibaldi',

  const inp = {border:'1px solid #dde3ec',borderRadius:8,padding:'8px 12px',fontSize:13.5,
    width:'100%',fontFamily:'inherit',outline:'none',color:'#16335c',background:'#fff'};
  const lbl = {fontSize:9.5,fontWeight:700,letterSpacing:'.8px',textTransform:'uppercase',
    color:'#6b7a90',display:'block',marginBottom:5};

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(16,28,60,.38)',zIndex:1000,
      display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
      onClick={e=>{if(e.target===e.currentTarget) onClose();}}>
      <div style={{background:'#fff',borderRadius:16,width:480,maxWidth:'100%',overflow:'hidden',
        boxShadow:'0 20px 60px rgba(0,0,0,.22)'}}>
        <div style={{background:'linear-gradient(100deg,#0c3470,#1c5cab)',padding:'18px 22px 16px',
          display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:10.5,color:'rgba(255,255,255,.5)',textTransform:'uppercase',letterSpacing:'.9px',marginBottom:4}}>Nova demanda</div>
            <div style={{fontSize:18,fontWeight:700,color:'#fff'}}>Adicionar ao cronograma</div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.15)',border:'none',borderRadius:8,
            width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',
            cursor:'pointer',color:'#fff',fontSize:20}}>×</button>
        </div>
        <div style={{padding:'20px 22px',display:'flex',flexDirection:'column',gap:14}}>
          <div>
            <label style={lbl}>Responsável</label>
            <select value={f.p} onChange={e=>setF({...f,p:+e.target.value})} style={inp}>
              {PEOPLE.map(p=><option key={p.id} value={p.id}>{p.name} — {RC[p.role].l}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Nome da demanda</label>
            <input type="text" placeholder="Ex: Relatório de Progresso Q3" value={f.name}
              onChange={e=>setF({...f,name:e.target.value})} style={inp}/>

          <div>

          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>

              <div key={k}>
                <label style={lbl}>{lab}</label>
                <input type="date" value={f[k]} onChange={e=>setF({...f,[k]:e.target.value})} style={inp}/>
              </div>
            ))}
          </div>
          <div>
            <label style={lbl}>Carga alocada — <span style={{color:'#16335c',fontWeight:800,fontSize:13}}>{f.load}%</span></label>
            <input type="range" min="5" max="100" step="5" value={f.load}
              onChange={e=>setF({...f,load:+e.target.value})} style={{marginBottom:6}}/>
            <div style={{height:6,background:'#e4e8f0',borderRadius:3,overflow:'hidden'}}>
              <div style={{width:`${f.load}%`,background:lc(f.load),height:'100%',transition:'width .2s'}}></div>
            </div>
          </div>
          <div>
            <label style={lbl}>Status inicial</label>
            <div style={{display:'flex',gap:8}}>
              {['planejada','andamento'].map(k=>(
                <button key={k} onClick={()=>setF({...f,st:k})} style={{
                  flex:1,border:'none',borderRadius:8,padding:'9px',fontSize:12.5,fontWeight:600,
                  cursor:'pointer',fontFamily:'inherit',transition:'all .15s',
                  background:f.st===k?SC[k].c:SC[k].t, color:f.st===k?'#fff':SC[k].d,
                }}>{SC[k].l}</button>

          <button onClick={()=>{if(ok){onAdd({...f,id:'d'+Date.now()});onClose();}}} style={{

            cursor:ok?'pointer':'default',fontFamily:'inherit',transition:'background .2s',

// ── Timeline Header ───────────────────────────────────────────
const LW = 228;
const RH = 66;
const TRK = 28;

function TLHeader(){
  return (
    <div style={{display:'flex',position:'sticky',top:0,zIndex:10,background:'#fff',
      borderBottom:'2px solid #e4e8f2',boxShadow:'0 2px 8px rgba(0,0,0,.06)',flexShrink:0}}>
      <div style={{width:LW,flexShrink:0,borderRight:'1px solid #e4e8f2',height:44,
        display:'flex',alignItems:'center',padding:'0 14px',
        position:'sticky',left:0,zIndex:11,background:'#fff'}}>
        <span style={{fontSize:9.5,fontWeight:700,letterSpacing:'.8px',textTransform:'uppercase',color:'#8a93a3'}}>Colaborador / Carga</span>
      </div>
      <div style={{flex:1,position:'relative',height:44,overflow:'hidden',minWidth:0}}>
        {MONTHS.map((m,i)=>(

            <span style={{fontSize:9,color:'#b0bbd0',marginTop:1}}>{m.yr}</span>

        <div style={{position:'absolute',left:`${pct(TOD)}%`,top:0,bottom:0,width:2,
          background:'rgba(224,82,75,.55)',transform:'translateX(-1px)',zIndex:2,pointerEvents:'none'}}>
          <div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',

            borderRadius:'0 0 4px 4px',whiteSpace:'nowrap',letterSpacing:'.5px'}}>HOJE</div>
        </div>
      </div>
    </div>
  );
}

// ── Gantt Row ─────────────────────────────────────────────────
function GanttRow({person, demands, expanded, onToggle, onHover, onLeave, onClickD, onAdd, optB}){
  const pd   = demands.filter(d => d.p === person.id);
  const load = useMemo(()=>curLoad(person.id,demands),[demands,person.id]);
  const rowH = expanded ? Math.max(RH, 14 + pd.length * TRK + 10) : RH;
  const rc   = RC[person.role];
  const [hovR, setHovR] = useState(false);

  return (
    <div style={{display:'flex',borderBottom:'1px solid #edf0f6',height:rowH,
      background:hovR&&!expanded?'#fafbfd':'#fff',transition:'background .1s',flexShrink:0}}
      onMouseEnter={()=>setHovR(true)} onMouseLeave={()=>setHovR(false)}>

      {/* Sticky left panel */}
      <div style={{width:LW,flexShrink:0,position:'sticky',left:0,zIndex:5,
        background:hovR?'#fafbfd':'#fff',borderRight:'1px solid #e4e8f2',
        height:'100%',display:'flex',alignItems:'center',gap:10,padding:'0 12px',
        cursor:'pointer',transition:'background .1s'}}
        onClick={onToggle}>
        {optB && <div style={{position:'absolute',left:0,top:0,bottom:0,width:4,background:lc(load)}}/>}
        <div style={{width:36,height:36,borderRadius:'50%',flexShrink:0,
          background:rc.t,border:`2px solid ${rc.c}`,
          display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:12,fontWeight:700,color:rc.c}}>{person.ini}</span>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:700,color:'#16335c',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{person.name}</div>
          <div style={{fontSize:11,color:'#8a93a3',marginTop:1.5}}>{rc.l}</div>
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontSize:13.5,fontWeight:800,color:lc(load),lineHeight:1}}>{load}%</div>
          {optB && <div style={{width:34,background:'#e4e8f0',borderRadius:3,height:4,marginTop:4,overflow:'hidden'}}>
            <div style={{width:`${Math.min(100,load)}%`,background:lc(load),height:'100%',transition:'width .3s'}}/>
          </div>}
        </div>
      </div>

      {/* Timeline area */}
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        {MONTHS.slice(1).map((m,i)=>(
          <div key={i} style={{position:'absolute',left:`${m.left}%`,top:0,bottom:0,
            width:1,background:'#edf0f6',pointerEvents:'none'}}/>
        ))}
        <div style={{position:'absolute',left:`${pct(TOD)}%`,top:0,bottom:0,width:2,
          background:'rgba(224,82,75,.28)',transform:'translateX(-1px)',pointerEvents:'none',zIndex:1}}/>

        {pd.map((d,i)=>{
          const s = SC[d.st];
          const left = pct(d.s), width = bw(d.s, d.e);
          let top, h;
          if(expanded){
            top = 12 + i * TRK; h = 20;
          } else if(optB){
            // Option B: bar height proportional to load% — shows capacity consumption at a glance
            h = Math.max(10, Math.round(46 * d.load / 100));
            top = (RH - h) / 2;
          } else {
            // Option A: uniform height, slight stagger for multiple overlapping bars
            h = 24;
            top = (RH - h) / 2 + (pd.length > 1 ? (i % 2 === 0 ? -7 : 7) : 0);
          }
          return (
            <div key={d.id} className="dbar" style={{
              position:'absolute', left:`${left}%`, width:`${width}%`,
              top, height:h, background:s.c, borderRadius:5,
              display:'flex', alignItems:'center', paddingLeft:6,
              overflow:'hidden', zIndex:2,
              opacity: d.st==='concluida' ? .72 : 1,
            }}
            onMouseEnter={e=>onHover(d,e)} onMouseLeave={onLeave}
            onClick={e=>{e.stopPropagation(); onClickD(d);}}>
              {width > 6 && h >= 16 &&
                <span style={{fontSize:10,color:'rgba(255,255,255,.95)',fontWeight:600,
                  whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',
                  lineHeight:1.2,pointerEvents:'none'}}>{d.name}</span>
              }
            </div>
          );
        })}

        {hovR && (
          <button style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',
            background:'#fff',border:'1px dashed #aab4c8',borderRadius:6,width:26,height:26,
            display:'flex',alignItems:'center',justifyContent:'center',
            cursor:'pointer',fontSize:17,color:'#6b7a90',zIndex:6,
            boxShadow:'0 1px 4px rgba(0,0,0,.08)',fontFamily:'inherit',lineHeight:1}}
            onClick={e=>{e.stopPropagation(); onAdd(person.id);}} title="Adicionar demanda">+</button>
        )}
      </div>
    </div>
  );
}

// ── Role Group Header (Opção B) ───────────────────────────────
function GroupHeader({role, count, avg}){
  const rc = RC[role];
  return (
    <div style={{display:'flex',borderBottom:'1px solid #dde6ef',height:32,background:rc.bg,flexShrink:0}}>
      <div style={{width:LW,flexShrink:0,position:'sticky',left:0,zIndex:6,background:rc.bg,
        borderRight:'1px solid #d4dce8',height:'100%',
        display:'flex',alignItems:'center',gap:8,paddingLeft:14,
        borderLeft:`3px solid ${rc.c}`}}>
        <span style={{fontSize:10,fontWeight:800,letterSpacing:'.8px',textTransform:'uppercase',color:rc.c}}>{rc.l}s</span>
        <span style={{fontSize:10,color:rc.c,opacity:.55}}>({count})</span>
      </div>
      <div style={{flex:1,display:'flex',alignItems:'center',paddingLeft:14}}>
        <span style={{fontSize:11,color:'#6b7a90'}}>Carga média: <strong style={{color:lc(avg)}}>{avg}%</strong></span>
      </div>
    </div>
  );
}

// ── Gantt Chart ───────────────────────────────────────────────
function GanttChart({demands, setDemands, optB, fStatus, fSearch, onAdd}){
  const [expanded, setExpanded] = useState({});
  const [tip,      setTip]      = useState({d:null,x:0,y:0});
  const [drawer,   setDrawer]   = useState(null);

  const visD = useMemo(()=>
    fStatus==='todos' ? demands : demands.filter(d=>d.st===fStatus)
  ,[demands,fStatus]);

  const filtered = useMemo(()=>
    PEOPLE.filter(p=>!fSearch||p.name.toLowerCase().includes(fSearch.toLowerCase()))
  ,[fSearch]);

  const groups = useMemo(()=>
    ['gerente','coord','eng'].map(role=>{
      const people = filtered.filter(p=>p.role===role);
      const avg = people.length
        ? Math.round(people.reduce((s,p)=>s+curLoad(p.id,visD),0)/people.length) : 0;
      return {role,people,avg};
    }).filter(g=>g.people.length>0)
  ,[filtered,visD]);

  function hov(d,e){ setTip({d,x:e.clientX,y:e.clientY}); }
  function leav(){ setTip({d:null,x:0,y:0}); }

  const rowP = person => ({
    person, demands:visD, expanded:!!expanded[person.id],
    onToggle:()=>setExpanded(prev=>({...prev,[person.id]:!prev[person.id]})),
    onHover:hov, onLeave:leav, onClickD:setDrawer, onAdd, optB,
  });

  return (
    <div style={{flex:1,overflow:'auto',position:'relative'}}>
      <div style={{minWidth:960}}>
        <TLHeader/>
        {optB
          ? groups.map(g=>(
              <React.Fragment key={g.role}>
                <GroupHeader role={g.role} count={g.people.length} avg={g.avg}/>
                {g.people.map(p=><GanttRow key={p.id} {...rowP(p)}/>)}
              </React.Fragment>
            ))
          : filtered.map(p=><GanttRow key={p.id} {...rowP(p)}/>)
        }
      </div>
      <Tooltip demand={tip.d} x={tip.x} y={tip.y}/>
      {drawer && <DemandDrawer demand={drawer} onClose={()=>setDrawer(null)} setDemands={setDemands}/>}
    </div>
  );
}

// ── Toolbar ───────────────────────────────────────────────────
function Toolbar({opt, setOpt, fStatus, setFStatus, fSearch, setFSearch, onAdd}){
  const statusOpts=[
    {k:'todos',l:'Todos'},
    {k:'andamento',l:'Em andamento'},
    {k:'planejada',l:'Planejada'},
    {k:'atrasada', l:'Atrasada'},
    {k:'concluida',l:'Concluída'},
  ];
  return (
    <div style={{background:'linear-gradient(100deg,#15716c,#34b074)',padding:'8px 18px',
      display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',flexShrink:0}}>
      {/* Option toggle */}
      <div style={{background:'rgba(255,255,255,.18)',borderRadius:8,padding:'3px',display:'flex',gap:2,flexShrink:0}}>
        {[['A','Vista Plana'],['B','Por Função']].map(([k,l])=>(
          <button key={k} onClick={()=>setOpt(k)} style={{
            border:'none',borderRadius:6,padding:'5px 13px',fontSize:12.5,fontWeight:700,
            cursor:'pointer',fontFamily:'inherit',transition:'all .15s',
            background:opt===k?'#fff':'transparent',
            color:opt===k?'#15716c':'rgba(255,255,255,.85)',
          }}>{l}</button>
        ))}
      </div>

      <div style={{width:1,height:22,background:'rgba(255,255,255,.28)',flexShrink:0}}/>

      {/* Search */}
      <div style={{background:'rgba(255,255,255,.18)',border:'1px solid rgba(255,255,255,.28)',
        borderRadius:8,height:32,display:'flex',alignItems:'center',gap:6,padding:'0 10px',flexShrink:0}}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.8)" strokeWidth="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" placeholder="Buscar colaborador…" value={fSearch}
          onChange={e=>setFSearch(e.target.value)}
          style={{border:'none',background:'transparent',outline:'none',
            fontSize:12.5,color:'#fff',width:130,fontFamily:'inherit'}}/>
        {fSearch && <button onClick={()=>setFSearch('')} style={{background:'none',border:'none',
          color:'rgba(255,255,255,.7)',cursor:'pointer',fontSize:14,padding:0,lineHeight:1}}>×</button>}
      </div>

      {/* Status filter */}
      <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
        {statusOpts.map(s=>(
          <button key={s.k} onClick={()=>setFStatus(s.k)} style={{
            border:'none',borderRadius:6,padding:'4px 10px',fontSize:11.5,fontWeight:600,
            cursor:'pointer',fontFamily:'inherit',transition:'all .15s',
            background:fStatus===s.k?'rgba(255,255,255,.92)':'rgba(255,255,255,.14)',
            color:fStatus===s.k&&s.k!=='todos' ? SC[s.k]?.d : fStatus===s.k ? '#16335c' : 'rgba(255,255,255,.85)',
          }}>{s.l}</button>
        ))}
      </div>

      <div style={{marginLeft:'auto',flexShrink:0}}>
        <button onClick={onAdd} style={{
          background:'rgba(255,255,255,.2)',border:'1px solid rgba(255,255,255,.38)',
          borderRadius:8,height:32,padding:'0 14px',color:'#fff',fontSize:13,fontWeight:600,
          cursor:'pointer',display:'flex',alignItems:'center',gap:6,fontFamily:'inherit',
        }}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Nova Demanda
        </button>
      </div>
    </div>
  );
}

// ── Page Header ───────────────────────────────────────────────
function PageHeader({demands}){
  const over  = PEOPLE.filter(p=>curLoad(p.id,demands)>=100).length;
  const risk  = PEOPLE.filter(p=>{const l=curLoad(p.id,demands);return l>=85&&l<100;}).length;
  const atr   = demands.filter(d=>d.st==='atrasada').length;
  return (
    <div style={{background:'linear-gradient(100deg,#0c3470,#1c5cab)',padding:'14px 20px',flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
        <div>
          <div style={{fontSize:10,color:'rgba(255,255,255,.48)',textTransform:'uppercase',letterSpacing:'.9px',marginBottom:3}}>CTG Engenharia</div>
          <h1 style={{fontSize:20,fontWeight:800,color:'#fff',margin:0,letterSpacing:'-.3px'}}>Controle de Carga</h1>
        </div>
        <div style={{width:1,height:36,background:'rgba(255,255,255,.2)',margin:'0 2px',flexShrink:0}}/>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {['Mai — Out 2026','8 colaboradores'].map((l,i)=>(
            <span key={i} style={{background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',
              color:'rgba(255,255,255,.8)',borderRadius:7,padding:'4px 11px',fontSize:11.5,fontWeight:500}}>{l}</span>
          ))}
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:8,flexWrap:'wrap'}}>
          {[
            {l:'Demandas',   v:demands.length, c:'#fff'},
            {l:'Atrasadas',  v:atr,  c:atr>0?'#f9a85d':'rgba(255,255,255,.55)'},
            {l:'Em risco',   v:risk, c:risk>0?'#e6a532':'rgba(255,255,255,.55)'},
            {l:'Sobrecarregados',v:over,c:over>0?'#e0524b':'rgba(255,255,255,.55)'},
          ].map((k,i)=>(
            <div key={i} style={{background:'rgba(255,255,255,.1)',borderRadius:8,
              padding:'7px 12px',textAlign:'center',minWidth:72}}>
              <div style={{fontSize:18,fontWeight:800,color:k.c,lineHeight:1}}>{k.v}</div>
              <div style={{fontSize:9,color:'rgba(255,255,255,.46)',textTransform:'uppercase',letterSpacing:'.5px',marginTop:3}}>{k.l}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Legend strip ──────────────────────────────────────────────
function Legend(){
  return (
    <div style={{display:'flex',gap:0,background:'#f5f7fb',borderBottom:'1px solid #e4e8f2',
      padding:'5px 18px',alignItems:'center',flexShrink:0,flexWrap:'wrap'}}>
      <span style={{fontSize:9,fontWeight:700,letterSpacing:'.8px',textTransform:'uppercase',color:'#8a93a3',marginRight:12}}>Status:</span>
      {Object.entries(SC).map(([k,v])=>(
        <div key={k} style={{display:'flex',alignItems:'center',gap:5,marginRight:14}}>
          <span style={{width:9,height:9,borderRadius:2,background:v.c,flexShrink:0}}></span>
          <span style={{fontSize:11.5,color:'#6b7a90'}}>{v.l}</span>
        </div>
      ))}
      <div style={{width:1,height:14,background:'#dde3ec',margin:'0 12px',flexShrink:0}}/>
      {[['≥100%','#e0524b','Sobrecarga'],['85–99%','#e6a532','Atenção'],['<85%','#2f9e54','OK']].map(([l,c,t])=>(
        <div key={l} style={{display:'flex',alignItems:'center',gap:4,marginRight:12}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:c,flexShrink:0}}></span>
          <span style={{fontSize:11.5,color:'#6b7a90'}}>{t} <span style={{color:'#b0bbd0'}}>({l})</span></span>
        </div>
      ))}
      <span style={{marginLeft:'auto',fontSize:10.5,color:'#9aa3b2'}}>↕ Clique no nome para expandir demandas</span>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────
function App(){
  const [t, setTweak] = useTweaks({ opcao:'A' });
  const [demands,  setDemands]  = useState(INIT_DEMANDS);
  const [fStatus,  setFStatus]  = useState('todos');
  const [fSearch,  setFSearch]  = useState('');
  const [addModal, setAddModal] = useState(null);

  const opt = t.opcao;

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <PageHeader demands={demands}/>
      <Toolbar
        opt={opt} setOpt={v=>setTweak('opcao',v)}
        fStatus={fStatus} setFStatus={setFStatus}
        fSearch={fSearch} setFSearch={setFSearch}
        onAdd={()=>setAddModal(1)}
      />
      <Legend/>
      <GanttChart
        demands={demands} setDemands={setDemands}
        optB={opt==='B'} fStatus={fStatus} fSearch={fSearch}
        onAdd={pid=>setAddModal(pid)}
      />
      {addModal !== null &&
        <AddModal defaultPerson={addModal} onClose={()=>setAddModal(null)}
          onAdd={d=>setDemands(prev=>[...prev,d])}/>
      }
      <TweaksPanel title="Tweaks">
        <TweakSection label="Visualização"/>
        <TweakRadio label="Agrupamento" value={opt}
          options={['A','B']}
          onChange={v=>setTweak('opcao',v)}/>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
